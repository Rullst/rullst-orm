name: Panic Policy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  panic-check:
    name: Zero Panics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check for panics
        run: |
          if grep -rnw 'rullst-orm/src' -e 'panic!' | grep -v 'schema.rs'; then
            echo "Raw panic! found. We aim for graceful error handling."
            exit 1
          else
            echo "No panics detected. Policy enforced."
          fi
