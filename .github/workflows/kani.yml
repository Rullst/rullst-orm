name: Kani Rust Verifier

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 0' # Todos os domingos às 05:00

jobs:
  kani:
    name: Run Kani Model Checking
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify with Kani
        uses: model-checking/kani-github-action@v1.2
        with:
          args: --workspace
