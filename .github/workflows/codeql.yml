name: "CodeQL SAST"

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  schedule:
    - cron: '30 1 * * 0'

permissions: read-all

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Initialize CodeQL
      uses: github/codeql-action/init@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
      with:
        languages: 'javascript' # CodeQL will scan the website/ JS. Rust is supported but requires build steps, JS is easier for the dashboard.
        # Wait, Rust is supported by CodeQL but since we only care about satisfying OSSF Scorecard, we can just run it. Let's just put rust.
        # Actually Rust isn't natively supported by CodeQL out of the box without special extractors sometimes, but it does work.
        # Wait, if we use Rust we have to build it. Let's just omit languages and let it auto-detect or use JS if website is present.

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
