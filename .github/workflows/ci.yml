name: Rust CI & Publish

on:
  push:
    branches: [ "main", "dev" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "dev" ]

# Permissão global padrão (Mínimo privilégio exigido pelo CodeQL)
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Permite que ferramentas de auditoria salvem alertas de segurança

    steps:
      - uses: actions/checkout@v6 # Atualizado para v6 (Node 22+)

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v5 # Atualizado para v5 (Versão estável mais moderna)
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Check Formatting
        run: cargo fmt -- --check

      - name: Run Clippy (deny warnings)
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

      - name: Run Tests
        run: cargo test --workspace --all-features

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit || true

      - name: Security Audit
        run: cargo audit

      - name: Measure build time
        run: |
          (/usr/bin/time -v cargo build --workspace --all-features) 2>&1 | tee build_time.txt || true

      - name: Upload build time artifact
        uses: actions/upload-artifact@v4 # Mantido na v4 moderna
        with:
          name: build-time
          path: build_time.txt

  publish:
    name: Publish to Crates.io
    needs: build_and_test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read # Escopo isolado e seguro para o deploy

    steps:
      - uses: actions/checkout@v6 # Atualizado para v6 aqui também

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish Macro Crate
        run: cargo publish -p rullst-orm-macros --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index sync
        run: sleep 30

      - name: Publish Core Crate
        run: |
          cargo publish -p rullst-orm --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || \
          (sleep 30 && cargo publish -p rullst-orm --token ${{ secrets.CARGO_REGISTRY_TOKEN }})