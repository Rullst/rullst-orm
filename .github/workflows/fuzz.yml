name: Fuzz Testing

on:
  workflow_dispatch:

jobs:
  fuzz:
    name: Run cargo-fuzz
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzzer (audit_diff)
        run: cargo fuzz run fuzz_audit -- -max_total_time=300
