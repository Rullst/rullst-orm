name: Mutation Testing

on:
  workflow_dispatch: # Permite ativar via botão na aba Actions

jobs:
  mutants:
    name: cargo-mutants shard ${{ matrix.shard }}/8
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-mutants
        run: cargo install cargo-mutants

      - name: Run mutants shard
        run: cargo mutants --shard ${{ matrix.shard }}/8 --in-place

      - name: Upload shard results
        uses: actions/upload-artifact@v4
        if: always() # Faz o upload mesmo se a pipeline falhar por mutantes sobreviventes
        with:
          name: mutants-out-${{ matrix.shard }}
          path: mutants.out/
